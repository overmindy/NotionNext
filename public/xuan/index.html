<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Xuan - Eternal Radiance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@300;400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030105;
            background: radial-gradient(circle at center, #14081c 0%, #000000 100%);
            overflow: hidden;
            font-family: 'Cinzel', 'Noto Serif SC', serif;
            color: white;
            user-select: none;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .text-container {
            position: absolute;
            bottom: 12%;
            text-align: center;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: all 1.8s cubic-bezier(0.25, 1, 0.5, 1);
            text-shadow: 0 0 25px rgba(255, 117, 140, 0.6);
            width: 90%;
        }

        .text-container.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .en-title {
            font-size: 1.8rem;
            letter-spacing: 12px;
            color: #ffd3b6;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .cn-subtitle {
            font-size: 1.4rem;
            letter-spacing: 6px;
            color: #ff7eb3;
            font-weight: 300;
            line-height: 1.8;
        }

        #start-screen {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 1.5s ease;
            pointer-events: auto;
        }

        #start-screen h1 {
            font-size: 2.5rem;
            letter-spacing: 12px;
            color: #fff;
            animation: pulse 2s infinite alternate;
        }

        .hint {
            font-size: 0.85rem;
            opacity: 0.6;
            margin-top: 25px;
            letter-spacing: 3px;
            font-family: sans-serif;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 10px #ff7eb3, 0 0 20px #ff7eb3; opacity: 0.8; }
            100% { text-shadow: 0 0 20px #ff7eb3, 0 0 40px #ff7eb3, 0 0 60px #ff7eb3; opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="overlay" id="text-layer"></div>

    <div id="start-screen" onclick="startExperience()">
        <h1>CLICK TO START</h1>
        <div class="hint">Interact with the stardust using your mouse</div>
    </div>

    <script>
        const config = {
            particleCount: 2200,
            bgStarCount: 300,
            spring: 0.045,
            friction: 0.86,
            mouseRadius: 130,
            mouseRepelStep: 16,
            colors: ['#ff7eb3', '#ff758c', '#ffd3b6', '#a8e6cf', '#ffffff', '#e0c3fc']
        };

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let width, height;
        let particles = [];
        let bgStars = [];
        let mouse = { x: -1000, y: -1000 };

        // 剧情线：8幕
        const timeline = [
            { shape: 'text', value: '萱', en: 'Serendipity', cn: '斯人若彩虹，遇上方知有', duration: 6000 },
            { shape: 'infinity', en: 'Endless', cn: '万物皆有尽头，唯爱无边无际', duration: 6000 },
            { shape: 'spiral', en: 'Universe', cn: '银河璀璨，你是其中最温柔的那颗星', duration: 6000 },
            { shape: 'heart', en: 'Cherish', cn: '所有的词不达意，都是因为满心欢喜', duration: 6000 },
            { shape: 'ring', en: 'Orbit', cn: '循迹而行，你是我唯一的引力', duration: 6000 },
            { shape: 'spiral', en: 'Cosmic Glow', cn: '众星为尘，唯你如晖', duration: 6000 },
            { shape: 'heart_large', en: 'Soulmate', cn: '这一生，我只愿为你沉溺', duration: 6000 },
            { shape: 'text', value: '萱', en: 'My Dearest', cn: '岁岁平安，岁岁有你', duration: 999999 } 
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
        window.addEventListener('mouseout', () => { mouse.x = -1000; mouse.y = -1000; });
        window.addEventListener('touchend', () => { mouse.x = -1000; mouse.y = -1000; });

        class BgStar {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 1.2;
                this.speed = Math.random() * 0.15 + 0.05;
                this.opacity = Math.random();
                this.fadeSpeed = (Math.random() - 0.5) * 0.01;
            }
            update() {
                this.y -= this.speed;
                if (this.y < 0) this.y = height;
                this.opacity += this.fadeSpeed;
                if (this.opacity > 1 || this.opacity < 0.1) this.fadeSpeed *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 12;
                this.vy = (Math.random() - 0.5) * 12;
                this.baseX = this.x;
                this.baseY = this.y;
                this.size = Math.random() * 2 + 0.8;
                this.baseSize = this.size;
                this.color = config.colors[Math.floor(Math.random() * config.colors.length)];
                this.wanderThrust = Math.random() * 0.8;
                this.angle = Math.random() * Math.PI * 2;
                this.isSparkle = Math.random() < 0.12;
                this.sparklePhase = Math.random() * Math.PI * 2;
            }

            explode() {
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 50 + 15;
                this.vx += Math.cos(angle) * force;
                this.vy += Math.sin(angle) * force;
            }

            update(isWandering) {
                if (isWandering) {
                    this.angle += (Math.random() - 0.5) * 0.3;
                    this.vx += Math.cos(this.angle) * this.wanderThrust * 0.15;
                    this.vy += Math.sin(this.angle) * this.wanderThrust * 0.15;
                    this.vx *= 0.95;
                    this.vy *= 0.95;
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                } else {
                    let dx = this.baseX - this.x;
                    let dy = this.baseY - this.y;
                    this.vx += dx * config.spring;
                    this.vy += dy * config.spring;
                }

                let mouseDx = this.x - mouse.x;
                let mouseDy = this.y - mouse.y;
                let mouseDist = Math.sqrt(mouseDx * mouseDx + mouseDy * mouseDy);

                if (mouseDist < config.mouseRadius) {
                    let force = (config.mouseRadius - mouseDist) / config.mouseRadius;
                    this.vx += (mouseDx / mouseDist) * force * config.mouseRepelStep + (mouseDy / mouseDist) * force * 5;
                    this.vy += (mouseDy / mouseDist) * force * config.mouseRepelStep - (mouseDx / mouseDist) * force * 5;
                }

                if (!isWandering) {
                    this.vx *= config.friction;
                    this.vy *= config.friction;
                    this.x += this.vx;
                    this.y += this.vy;
                }

                if (this.isSparkle) {
                    this.sparklePhase += 0.06;
                    this.size = this.baseSize + Math.sin(this.sparklePhase) * 1.5;
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(0.1, this.size), 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            bgStars = [];
            for (let i = 0; i < config.particleCount; i++) particles.push(new Particle());
            for (let i = 0; i < config.bgStarCount; i++) bgStars.push(new BgStar());
        }

        function getTextPoints(text) {
            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d');
            offCanvas.width = width;
            offCanvas.height = height;
            let fontSize = Math.min(width * 0.45, 320);
            offCtx.font = `bold ${fontSize}px "Noto Serif SC", serif`;
            offCtx.textAlign = 'center';
            offCtx.textBaseline = 'middle';
            offCtx.fillStyle = 'white';
            offCtx.fillText(text, width / 2, height / 2 - 80); 
            const imgData = offCtx.getImageData(0, 0, width, height).data;
            const points = [];
            const step = Math.ceil(width / 180); 
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    if (imgData[(y * width + x) * 4 + 3] > 128) points.push({ x, y });
                }
            }
            return points;
        }

        function getInfinityPoints(scaleFactor) {
            const points = [];
            const centerX = width / 2;
            const centerY = height / 2 - 60;
            const scale = Math.min(width, height) / scaleFactor;
            for (let t = 0; t < Math.PI * 2; t += 0.015) {
                const denominator = 1 + Math.pow(Math.sin(t), 2);
                const x = (scale * Math.cos(t)) / denominator;
                const y = (scale * Math.sin(t) * Math.cos(t)) / denominator;
                for(let i=0; i<6; i++) points.push({ x: centerX + x + (Math.random()-0.5)*20, y: centerY + y + (Math.random()-0.5)*20 });
            }
            return points;
        }

        function getSpiralPoints() {
            const points = [];
            const centerX = width / 2, centerY = height / 2 - 60, arms = 3;
            for(let arm = 0; arm < arms; arm++) {
                const angleOffset = (Math.PI * 2 / arms) * arm;
                for(let i = 0; i < 400; i++) {
                    const t = i * 0.04, r = t * 18;
                    const x = r * Math.cos(t + angleOffset), y = r * Math.sin(t + angleOffset) * 0.6;
                    for(let j=0; j<2; j++) points.push({ x: centerX + x + (Math.random()-0.5) * t * 2.5, y: centerY + y + (Math.random()-0.5) * t * 2.5 });
                }
            }
            return points;
        }

        function getHeartPoints(scaleFactor) {
            const points = [];
            const centerX = width / 2, centerY = height / 2 - 60;
            const scale = Math.min(width, height) / scaleFactor;
            for (let t = 0; t < Math.PI * 2; t += 0.04) {
                const x = 16 * Math.pow(Math.sin(t), 3), y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                for (let i = 0; i < 18; i++) points.push({ x: centerX + x * scale + (Math.random() - 0.5) * 15, y: centerY + y * scale + (Math.random() - 0.5) * 15 });
            }
            return points;
        }

        function getRingPoints() {
            const points = [];
            const centerX = width / 2, centerY = height / 2 - 60, radius = Math.min(width, height) * 0.32;
            for (let i = 0; i < 1200; i++) {
                const angle = Math.random() * Math.PI * 2, r = radius + (Math.random() - 0.5) * 100;
                points.push({ x: centerX + Math.cos(angle) * r, y: centerY + Math.sin(angle) * r * 0.35 });
            }
            return points;
        }

        function updateParticleTargets(points) {
            points.sort(() => Math.random() - 0.5);
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                const target = points[i % points.length];
                p.baseX = target.x + (i >= points.length ? (Math.random()-0.5)*15 : 0);
                p.baseY = target.y + (i >= points.length ? (Math.random()-0.5)*15 : 0);
            }
        }

        let isWandering = true;
        function animate() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(8, 2, 12, 0.22)'; 
            ctx.fillRect(0, 0, width, height);
            bgStars.forEach(star => { star.update(); star.draw(); });
            ctx.globalCompositeOperation = 'screen';
            particles.forEach(p => { p.update(isWandering); p.draw(); });
            requestAnimationFrame(animate);
        }

        const textLayer = document.getElementById('text-layer');
        function transitionToStage(index) {
            if (index >= timeline.length) return;
            const stage = timeline[index];
            isWandering = false;
            if (index > 0) particles.forEach(p => p.explode());
            let targetPoints = [];
            switch(stage.shape) {
                case 'text': targetPoints = getTextPoints(stage.value); break;
                case 'infinity': targetPoints = getInfinityPoints(2.5); break;
                case 'spiral': targetPoints = getSpiralPoints(); break;
                case 'heart': targetPoints = getHeartPoints(60); break;
                case 'ring': targetPoints = getRingPoints(); break;
                case 'heart_large': targetPoints = getHeartPoints(45); break;
            }
            updateParticleTargets(targetPoints);
            const oldContainer = textLayer.querySelector('.text-container');
            if (oldContainer) { oldContainer.classList.remove('active'); setTimeout(() => oldContainer.remove(), 1600); }
            setTimeout(() => {
                const newContainer = document.createElement('div');
                newContainer.className = 'text-container';
                newContainer.innerHTML = `<div class="en-title">${stage.en}</div><div class="cn-subtitle">${stage.cn}</div>`;
                textLayer.appendChild(newContainer);
                requestAnimationFrame(() => newContainer.classList.add('active'));
            }, 1000); 
            if (stage.duration !== 999999) setTimeout(() => transitionToStage(index + 1), stage.duration);
        }

        function startExperience() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').remove();
                initParticles();
                animate();
                setTimeout(() => transitionToStage(0), 1500);
            }, 1000);
        }
        resize();
    </script>
</body>
</html>
